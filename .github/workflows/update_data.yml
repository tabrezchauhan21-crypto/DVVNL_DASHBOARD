name: Update Dashboard Data

on:
  schedule:
    - cron: '0 * * * *'   # Har ghante auto-run
  workflow_dispatch:        # Manual run bhi ho sake

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Fetch Excel & rebuild dashboard
        env:
          SP_5KW: ${{ secrets.SP_5KW }}
        run: python update_data.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data_v4.js
          git diff --staged --quiet || git commit -m "Auto-update: $(date '+%d %b %Y %H:%M IST')"
          git push
